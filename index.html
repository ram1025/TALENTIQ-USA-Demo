<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TALENTIQ-USA - Login</title>
<style>
* {box-sizing: border-box; margin:0; padding:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;}
body {background:#f8fafc;}
.hidden {display:none!important;}

/* LOGIN PAGE */
.login-container {min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg, #16a34a 0%, #0B3D91 100%);}
.login-box {background:white; padding:40px; border-radius:16px; width:90%; max-width:400px; box-shadow:0 20px 50px rgba(0,0,0,0.2);}
.login-logo {text-align:center; font-size:28px; font-weight:800; background: linear-gradient(90deg, #16a34a, #0B3D91); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom:10px;}
.login-subtitle {text-align:center; color:#64748b; margin-bottom:25px; font-size:14px;}
.input-group {position:relative; margin:10px 0;}
.login-input {width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:8px; font-size:15px; padding-right:45px;}
.eye-btn {position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:20px; background:none; border:none; color:#64748b;}
.eye-btn:hover {color:#16a34a;}
.login-btn {width:100%; padding:14px; background:linear-gradient(90deg, #16a34a, #0B3D91); color:white; border:none; border-radius:8px; font-weight:700; font-size:16px; cursor:pointer; margin-top:10px;}
.login-btn:hover {opacity:0.9;}
.demo-info {background:#f0fdf4; border:1px solid #16a34a; padding:12px; border-radius:8px; margin-top:15px; font-size:13px; color:#15803d; text-align:center;}

/* REST OF DASHBOARD CSS SAME AS BEFORE */
.topbar {background:white; padding:12px 24px; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100;}
.logo {font-size:20px; font-weight:800; background: linear-gradient(90deg, #16a34a, #0B3D91); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
.container {max-width:900px; margin:30px auto; background:white; padding:35px; border-radius:12px; border:1px solid #e2e8f0;}
.banner {background: linear-gradient(135deg, #16a34a 0%, #0B3D91 50%, #F97316 100%); padding:20px; border-radius:12px; margin-bottom:20px; color:white;}
.btn {background:linear-gradient(90deg, #16a34a, #0B3D91); color:white; padding:14px 28px; border:none; border-radius:6px; font-weight:700; cursor:pointer; font-size:16px; width:100%; margin-top:20px;}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-container">
  <div class="login-box">
    <div class="login-logo">TALENTIQ-USA 🚀</div>
    <p class="login-subtitle">AI Resume Builder for US Jobs</p>

    <input type="email" id="loginEmail" placeholder="Email" class="login-input" style="padding-right:14px;" value="demo@talentiq.com">
    
    <div class="input-group">
      <input type="password" id="loginPassword" placeholder="Password" class="login-input" value="demo123">
      <button type="button" class="eye-btn" onclick="togglePassword()">👁️</button>
    </div>

    <button class="login-btn" onclick="handleLogin()">Login</button>

    <div class="demo-info">
      <b>Demo Login:</b><br>
      Email: demo@talentiq.com<br>
      Password: demo123
    </div>
  </div>
</div>

<!-- DASHBOARD PAGE -->
<div id="dashboardPage" class="hidden">
  <div class="topbar">
    <div class="logo">TALENTIQ-USA 🚀</div>
  </div>
  <div class="container">
    <div class="banner">
      <h2>Welcome to Dashboard</h2>
      <p>Upload your resume to get started</p>
    </div>
    <button class="btn" onclick="handleLogout()">Logout</button>
  </div>
</div>

<script>
// PASSWORD EYE TOGGLE
function togglePassword(){
  let passInput = document.getElementById('loginPassword');
  let eyeBtn = document.querySelector('.eye-btn');
  
  if(passInput.type === "password"){
    passInput.type = "text";
    eyeBtn.innerText = "🙈"; // hide icon
  } else {
    passInput.type = "password";
    eyeBtn.innerText = "👁️"; // show icon
  }
}

// LOGIN LOGIC
function handleLogin(){
  let email = document.getElementById('loginEmail').value;
  let pass = document.getElementById('loginPassword').value;

  if(email === "demo@talentiq.com" && pass === "demo123"){
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('dashboardPage').classList.remove('hidden');
    localStorage.setItem("talentiqLoggedIn", "true");
  } else {
    alert("❌ Invalid credentials. Use Demo: demo@talentiq.com / demo123");
  }
}

function handleLogout(){
  localStorage.removeItem("talentiqLoggedIn");
  document.getElementById('dashboardPage').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
}

// Check if already logged in
window.onload = function(){
  if(localStorage.getItem("talentiqLoggedIn") === "true"){
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('dashboardPage').classList.remove('hidden');
  }
}
</script>

</body>
</html>
